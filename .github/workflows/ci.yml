name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: cloud-trade-api-dev

jobs:
  config-validation:
    name: Config Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate environment config files
        run: python scripts/validate_config.py

  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore .NET dependencies
        run: dotnet restore CloudTradeDeployment.sln

      - name: Build .NET solution
        run: dotnet build CloudTradeDeployment.sln --configuration Release --no-restore

      - name: Run .NET tests
        run: dotnet test CloudTradeDeployment.sln --configuration Release --no-build

  docker-smoke-test:
    name: Docker Smoke Test
    runs-on: ubuntu-latest
    needs:
      - config-validation
      - build-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f app/src/TradeApi/Dockerfile -t cloud-trade-api:${{ github.sha }} .

      - name: Run Docker container
        run: |
          docker run -d \
            --name cloud-trade-api \
            -p 5000:8080 \
            -e APP_VERSION=${{ github.sha }} \
            -e APP_ENVIRONMENT=ci \
            -e APP_LOG_LEVEL=information \
            cloud-trade-api:${{ github.sha }}

      - name: Smoke test Docker container
        run: |
          for i in {1..10}; do
            if curl -f http://localhost:5000/health; then
              echo "Container smoke test passed"
              exit 0
            fi
            echo "Waiting for container to start..."
            sleep 2
          done

          echo "Container did not become healthy"
          docker logs cloud-trade-api
          exit 1

      - name: Show Docker logs
        if: always()
        run: docker logs cloud-trade-api || true

      - name: Stop Docker container
        if: always()
        run: docker rm -f cloud-trade-api || true

  publish-image:
    name: Publish Image to ECR
    runs-on: ubuntu-latest
    needs:
      - docker-smoke-test

    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.ENABLE_AWS_PUBLISH == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::12}" >> $GITHUB_ENV

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image for publishing
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build \
            -f app/src/TradeApi/Dockerfile \
            -t $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $REGISTRY/$ECR_REPOSITORY:latest \
            .

      - name: Push Docker image to ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker push $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$ECR_REPOSITORY:latest